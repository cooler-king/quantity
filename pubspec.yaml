name: quantity
version: 5.0.0
description: Facilitates working with physical quantities such as angles, lengths, masses, temperatures and many others.  Supports uncertainty and arbitrary precision.
homepage: https://github.com/cooler-king/quantity
repository: https://github.com/cooler-king/quantity
issue_tracker: https://github.com/cooler-king/quantity/issues
topics:
  - physics
  - units-of-measure
  - measurement
  - scientific
  - uncertainty
documentation: https://github.com/cooler-king/quantity/wiki
environment:
  sdk: '>=3.0.0 <4.0.0'
dependencies:
  decimal: ^3.2.4
  intl: '>=0.19.0 <1.0.0'
  logging: ^1.0.0
dev_dependencies:
  test: ^1.16.0
  lints: ^3.0.0
  benchmark_harness: ^2.2.0
  coverage: ^1.7.2
